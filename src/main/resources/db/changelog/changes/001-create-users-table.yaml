databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: sporty-demo
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
        - sql:
            sql: ALTER TABLE users ADD CONSTRAINT chk_users_id_positive CHECK (id > 0)
