databaseChangeLog:
  - changeSet:
      id: 003-create-markets-table
      author: sporty-demo
      changes:
        - createTable:
            tableName: markets
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
        - sql:
            sql: ALTER TABLE markets ADD CONSTRAINT chk_markets_id_positive CHECK (id > 0)
