spring:
  application:
    name: sporty-demo
  datasource:
    url: jdbc:h2:mem:sportydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  h2:
    console:
      enabled: true
      path: /h2-console
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: sporty-demo-settlement
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.sporty.demo.dto
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.sporty.demo.dto.EventOutcomeMessage

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: sporty-demo-producer
    send-message-timeout: 10000

app:
  kafka:
    topic:
      event-outcomes: event-outcomes
  rocketmq:
    topic:
      bet-settlements: bet-settlements

server:
  port: 8080

logging:
  level:
    com.sporty.demo: INFO
    org.apache.rocketmq: WARN
